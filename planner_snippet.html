    .pl-palette{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;
      position:sticky;top:10px;max-height:88vh;display:flex;flex-direction:column;}
    @media(max-width:820px){.pl-palette{position:static;max-height:none;}}
    .pl-tabs{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
    .pl-tab{font-family:inherit;font-size:12px;font-weight:700;padding:5px 9px;border-radius:999px;
      border:1px solid var(--line);background:var(--stone);color:var(--muted);cursor:pointer;}
    .pl-tab.on{background:var(--pine);border-color:var(--pine);color:#fff;}
    .pl-tabnote{font-size:11.5px;color:var(--muted);margin:0 0 8px;font-style:italic;}

    .pl-chip{font-family:inherit;display:flex;justify-content:space-between;gap:8px;align-items:baseline;text-align:left;
      font-size:13px;padding:7px 10px;border-radius:9px;border:1px solid var(--line);background:#fff;
      cursor:grab;color:var(--ink);}

    .pl-chip.sel{border-color:var(--sun);background:var(--sun-soft);box-shadow:0 0 0 2px var(--sun);}

  var LS_KEY="glenPlanV1";

  function emptyPlan(){var p={};DAYS.forEach(function(d){p[d.k]=[[],[],[],[]];});return p;}
  var plan=emptyPlan();

  /* --- encode/decode: days joined by ';', slots by '|', entries by ','.
         number = ITEMS index; '~' prefix = custom text (URI-encoded). --- */
  function encodePlan(p){
    return DAYS.map(function(d){
      return p[d.k].map(function(slot){
        return slot.map(function(en){
          return typeof en==="number"?String(en):"~"+encodeURIComponent(en);
        }).join(",");
      }).join("|");
    }).join(";");
  }
  function decodePlan(str){
    var p=emptyPlan();
    if(!str)return p;
    var days=str.split(";");
    DAYS.forEach(function(d,di){
      if(!days[di])return;
      days[di].split("|").forEach(function(slot,si){
        if(si>3||!slot)return;
        slot.split(",").forEach(function(tok){
          if(!tok)return;
          if(tok.charAt(0)==="~"){
            try{p[d.k][si].push(decodeURIComponent(tok.slice(1)).slice(0,60));}catch(e){}
          }else{
            var n=parseInt(tok,10);
            if(!isNaN(n)&&n>=0&&n<ITEMS.length)p[d.k][si].push(n);
          }
        });
      });
    });
    return p;
  }

  var $=function(id){return document.getElementById(id);};
  var statusTimer=null;
  function flash(msg){
    var el=$("pl-status");el.textContent=msg;
    clearTimeout(statusTimer);statusTimer=setTimeout(function(){el.textContent="";},2500);
  }
  function save(msg){
    var enc=encodePlan(plan);
    try{localStorage.setItem(LS_KEY,enc);}catch(e){}
    try{history.replaceState(null,"",enc.replace(/[;|]/g,"")===""?location.pathname:location.pathname+"?p="+encodeURIComponent(enc));}catch(e){}
    flash(msg||"Saved ✓");
  }

  /* --- selection (tap-to-place, used on touch and as a click fallback) --- */
  var pending=null; // {type:'item',id} | {type:'custom',text}
  function setPending(p,label){
    pending=p;
    var hint=$("pl-hint");
    if(p){hint.hidden=false;hint.innerHTML="";
      hint.appendChild(document.createTextNode("Now tap a day slot to place “"+label+"” — or "));
      var c=document.createElement("button");c.type="button";c.className="pl-btn";c.style.cssText="padding:2px 10px;font-size:12px;";c.textContent="cancel";
      c.addEventListener("click",function(){setPending(null);renderChips();});
      hint.appendChild(c);
    }else{hint.hidden=true;}
  }

  /* --- palette --- */
  var activeTab="f";
  function renderTabs(){
    var box=$("pl-tabs");box.innerHTML="";
    TABS.forEach(function(t){
      var b=document.createElement("button");
      b.type="button";b.className="pl-tab"+(t.k===activeTab?" on":"");
      b.textContent=t.label;b.setAttribute("role","tab");
      b.addEventListener("click",function(){activeTab=t.k;renderTabs();renderChips();});
      box.appendChild(b);
    });
    $("pl-tabnote").textContent=TABS.filter(function(t){return t.k===activeTab;})[0].note;
  }
  function renderChips(){
    var box=$("pl-chips");box.innerHTML="";
    ITEMS.forEach(function(it,id){
      if(it.g!==activeTab)return;
      var b=document.createElement("button");
      b.type="button";b.className="pl-chip"+(pending&&pending.type==="item"&&pending.id===id?" sel":"");
      b.draggable=true;
      var nm=document.createElement("span");nm.className="nm";nm.textContent=it.n;
      var tm=document.createElement("span");tm.className="tm";
      if(it.t.indexOf("$")>-1){
        tm.appendChild(document.createTextNode(it.t.replace(/ ?· ?\$/,"")+" "));
        var f=document.createElement("span");f.className="fee";f.textContent="$";tm.appendChild(f);
      }else{tm.textContent=it.t;}
      b.appendChild(nm);b.appendChild(tm);
      b.addEventListener("dragstart",function(e){
        e.dataTransfer.setData("text/plain","n"+id);e.dataTransfer.effectAllowed="copy";
      });
      b.addEventListener("click",function(){
        if(pending&&pending.type==="item"&&pending.id===id){setPending(null);}
        else{setPending({type:"item",id:id},it.n);}
        renderChips();
      });
      box.appendChild(b);
    });
  }

  /* --- days & slots --- */
  function entryLabel(en){return typeof en==="number"?ITEMS[en].n:en;}
  function renderDays(){
    var box=$("pl-days");box.innerHTML="";
    DAYS.forEach(function(d){
      var card=document.createElement("div");card.className="pl-day";
      var h=document.createElement("h3");h.textContent=d.name+" · "+d.date;card.appendChild(h);
      if(d.note){var dn=document.createElement("p");dn.className="dnote";dn.textContent=d.note;card.appendChild(dn);}
      SLOTS.forEach(function(sname,si){
        var lab=document.createElement("div");lab.className="pl-slotname";lab.textContent=sname;card.appendChild(lab);
        var ul=document.createElement("ul");ul.className="pl-drop";ul.dataset.day=d.k;ul.dataset.slot=si;
        var entries=plan[d.k][si];
        if(!entries.length){
          var eh=document.createElement("li");eh.className="pl-empty-hint";eh.textContent="drop here";ul.appendChild(eh);
        }
        entries.forEach(function(en,ei){
          var li=document.createElement("li");li.className="pl-entry";li.draggable=true;
          var txt=document.createElement("span");txt.className="en";txt.textContent=entryLabel(en);
          if(typeof en==="number"){
            var et=document.createElement("span");et.className="et";et.textContent=ITEMS[en].t;txt.appendChild(et);
          }
          var x=document.createElement("button");x.type="button";x.className="pl-x";
          x.setAttribute("aria-label","Remove "+entryLabel(en));x.textContent="×";
          x.addEventListener("click",function(){plan[d.k][si].splice(ei,1);save("Removed");renderDays();});
          li.appendChild(txt);li.appendChild(x);
          li.addEventListener("dragstart",function(e){
            e.dataTransfer.setData("text/plain","m"+d.k+si+":"+ei);e.dataTransfer.effectAllowed="move";
          });
          ul.appendChild(li);
        });
        ul.addEventListener("dragover",function(e){e.preventDefault();ul.classList.add("over");});
        ul.addEventListener("dragleave",function(){ul.classList.remove("over");});
        ul.addEventListener("drop",function(e){
          e.preventDefault();ul.classList.remove("over");
          handleDrop(e.dataTransfer.getData("text/plain"),d.k,si);
        });
        ul.addEventListener("click",function(){
          if(!pending)return;
          if(pending.type==="item")plan[d.k][si].push(pending.id);
          else plan[d.k][si].push(pending.text);
          setPending(null);save("Added ✓");renderChips();renderDays();
        });
        card.appendChild(ul);
      });
      box.appendChild(card);
    });
    renderPlan();
  }
  function handleDrop(data,day,slot){
    if(!data)return;
    if(data.charAt(0)==="n"){
      var id=parseInt(data.slice(1),10);
      if(!isNaN(id)&&id>=0&&id<ITEMS.length){plan[day][slot].push(id);save("Added ✓");renderDays();}
    }else if(data.charAt(0)==="m"){
      var sd=data.charAt(1),ss=parseInt(data.charAt(2),10),ei=parseInt(data.slice(4),10);
      if(plan[sd]&&plan[sd][ss]&&ei>=0&&ei<plan[sd][ss].length){
        var en=plan[sd][ss].splice(ei,1)[0];
        plan[day][slot].push(en);save("Moved ✓");renderDays();
      }
    }
  }

  /* --- dynamic day-by-day plan: writes the #dyn-days section further up the page.
         Fixed anchors (Fri check-in, Mon rollout) and the "At Jellystone" sidebars
         always render; everything else comes from the builder selections. --- */
  var PLAN_DAYS={
    f:{title:"Friday — Arrive & settle in",side:"🏕️ At Jellystone tonight",
       list:[{t:"3:00",id:1},{t:"5:00",id:4},{t:"6:00",id:5},{t:"7:00",id:7},{t:"7:00",id:8},{t:"8:00",id:9}],
       drive:[0,1],driveLabel:"On the drive up",fixedBefore:2,fixedWhen:"Afternoon",
       fixedWhat:"Check in at <b>Jellystone</b> (~3pm), claim your site, and grab the printed activity schedule at the front desk."},
    s:{title:"Saturday — Your big day out",side:"🏕️ At Jellystone today",
       list:[{t:"11:30",id:14},{t:"2:00",id:19},{t:"2:00",id:20},{t:"5:00",id:24},{t:"7:00",id:27},{t:"8:00",id:29}]},
    u:{title:"Sunday — Last full day of Santa's Summer Vacation",side:"🏕️ At Jellystone today",
       list:[{t:"10:00",id:33},{t:"1:00",id:40},{t:"4:00",id:42},{t:"7:00",id:47},{t:"8:00",id:49},{t:"9:00",id:50}]},
    m:{title:"Monday — Color Splash morning & the drive home",side:"🎨 At Jellystone this AM",
       list:[{t:"9:00",id:52},{t:"12:00",id:58},{t:"2:00",id:60}],
       note:"🌈 New theme: Color Splash! Monday times post on the board that morning — check at breakfast.",
       drive:[1,2,3],driveLabel:"On the drive home",fixedBefore:1,fixedWhen:"Late AM",
       fixedWhat:"Roll out south on <b>I‑93</b> toward home."}
  };
  var OPENERS=["Kick off the morning with","Midday, it's","In the afternoon,","Tonight it's"];
  function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function phrase(en,si){
    if(typeof en==="string")return "<b>"+esc(en)+"</b>";
    var it=ITEMS[en];
    if(it.g==="e"){
      return ["breakfast at","lunch at","an afternoon stop at","dinner at"][si]+" <b>"+esc(it.n)+"</b> ("+esc(it.t)+")";
    }
    if(it.g==="a")return "<b>"+esc(it.n)+"</b>"+(en===FUNSPOT_ID?"":" ("+esc(it.t)+")");
    return "<b>"+esc(it.n)+"</b> at "+esc(it.t.split("–")[0]);
  }
  function renderPlan(){
    var box=document.getElementById("dyn-days");
    if(!box)return;
    var out="";
    DAYS.forEach(function(d){
      var cfg=PLAN_DAYS[d.k],slots=plan[d.k];
      var picked={};slots.forEach(function(s){s.forEach(function(en){if(typeof en==="number")picked[en]=1;});});
      var rows="",any=false,hasFunspot=false;
      for(var si=0;si<4;si++){
        if(cfg.fixedBefore===si)rows+='<div class="slot"><div class="when">'+cfg.fixedWhen+'</div><div class="what">'+cfg.fixedWhat+'</div></div>';
        var entries=slots[si];
        if(!entries.length)continue;
        any=true;
        var onDrive=cfg.drive&&cfg.drive.indexOf(si)>-1;
        var parts=entries.map(function(en){
          if(en===FUNSPOT_ID)hasFunspot=true;
          return phrase(en,si);
        });
        rows+='<div class="slot"><div class="when">'+SLOTS[si]+'</div><div class="what">'
          +(onDrive?cfg.driveLabel+": ":OPENERS[si]+" ")+parts.join(", then ")+'.</div></div>';
      }
      if(!any)rows+='<div class="slot"><div class="when">All day</div><div class="what">Nothing picked yet — <a href="#builder">drag activities into '+d.name+' below</a> and this day writes itself. 👇</div></div>';
      if(hasFunspot)rows+='<div class="slot"><div class="when">🕹️ Detour</div><div class="what"><b>Funspot</b> adds about <b>35–40 minutes of total detour time</b> — worth it to visit the biggest arcade on the planet? <b>Yes.</b></div></div>';
      var side='<div class="day-camp-h">'+cfg.side+'</div><ul>';
      cfg.list.forEach(function(ev){
        var it=ITEMS[ev.id];
        side+='<li><span class="ct">'+ev.t+'</span><span>'
          +(picked[ev.id]?'<span class="star">★</span> ':'')+esc(it.n)
          +(it.t.indexOf("$")>-1?' <span class="fee">$</span>':'')+'</span></li>';
      });
      side+='</ul>';
      if(cfg.note)side+='<div class="note-line">'+cfg.note+'</div>';
      side+='<div class="note-line">★ = picked in your builder</div>';
      out+='<div class="day"><h3>'+esc(cfg.title)+'</h3><div class="day-cols"><div class="day-main">'+rows
        +'</div><aside class="day-camp">'+side+'</aside></div></div>';
    });
    box.innerHTML=out;
  }

  /* --- toolbar --- */
  $("pl-share").addEventListener("click",function(){
    var url=location.origin+location.pathname+"?p="+encodeURIComponent(encodePlan(plan));
    function done(){flash("Link copied — send it to anyone!");}
    function fallback(){
      var ta=document.createElement("textarea");ta.value=url;ta.style.position="fixed";ta.style.opacity="0";
      document.body.appendChild(ta);ta.select();
      try{document.execCommand("copy");done();}catch(e){prompt("Copy this link:",url);}
      document.body.removeChild(ta);
    }
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done,fallback);}
    else fallback();
  });
  $("pl-print").addEventListener("click",function(){
    document.body.classList.add("print-plan");
    window.print();
    setTimeout(function(){document.body.classList.remove("print-plan");},500);
  });
  $("pl-clear").addEventListener("click",function(){
    if(!confirm("Clear your whole plan?"))return;
    plan=emptyPlan();save("Cleared");renderDays();
  });
  $("pl-custom-add").addEventListener("click",addCustom);
  $("pl-custom-input").addEventListener("keydown",function(e){if(e.key==="Enter")addCustom();});
  function addCustom(){
    var inp=$("pl-custom-input");var v=inp.value.trim().slice(0,60);
    if(!v)return;
    inp.value="";
    setPending({type:"custom",text:v},v);
  }

  /* --- init --- */
  var fromUrl=new URLSearchParams(location.search).get("p");
  if(fromUrl){
    plan=decodePlan(fromUrl);
    var b=$("pl-banner");b.hidden=false;
    b.textContent="📬 A shared plan was loaded from this link. Anything you change saves to this device (and updates the link in your address bar).";
    try{localStorage.setItem(LS_KEY,encodePlan(plan));}catch(e){}
  }else{
    try{plan=decodePlan(localStorage.getItem(LS_KEY)||"");}catch(e){}
  }
  renderTabs();renderChips();renderDays();
  })();
  </script>
